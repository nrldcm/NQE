name: nqe
description: "NQE — mobile trading ledger. Funds managed by Willong Capital."
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local, ACID/transactional storage — the corruption-resistant source of truth.
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # Biometric (fingerprint / face) + device-credential unlock.
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46

  # Charts / visuals for trades & ledger.
  fl_chart: ^0.69.2

  # Encrypted export/import & backup sharing (to Google Drive via share sheet).
  cryptography: ^2.7.0
  share_plus: ^10.1.2
  file_picker: ^8.1.4

  # Settings / small key-value state.
  shared_preferences: ^2.3.3
  intl: ^0.19.0

  # v2: embedded live TradingView charts.
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0

  # v2: LAN device sync — mobile runs the server; desktop connects.
  shelf: ^1.4.1
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^3.0.1
  network_info_plus: ^6.1.0
  flutter_foreground_task: ^8.17.0

  # v2 desktop: SQLite via FFI (Windows/Linux/macOS desktop client).
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24
  window_manager: ^0.4.3
  windows_single_instance: ^1.0.1

  # v2 desktop parity: embedded web view for the Live tab (WebView2) with an
  # open-in-browser fallback via url_launcher.
  webview_windows: ^0.4.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/nqe_icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon/nqe_icon_fg.png"
  min_sdk_android: 23
