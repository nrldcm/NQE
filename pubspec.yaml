name: nqe
description: "NQE — mobile trading ledger. Funds managed by Willong Capital."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local, ACID/transactional storage — the corruption-resistant source of truth.
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # Biometric (fingerprint / face) + device-credential unlock.
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46

  # Charts / visuals for trades & ledger.
  fl_chart: ^0.69.2

  # Encrypted export/import & backup sharing (to Google Drive via share sheet).
  cryptography: ^2.7.0
  share_plus: ^10.1.2
  file_picker: ^8.1.4

  # Settings / small key-value state.
  shared_preferences: ^2.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
