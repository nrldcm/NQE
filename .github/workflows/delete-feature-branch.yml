name: Delete merged feature branch

# One-off maintenance: the v2-live-trading feature branch has been merged into
# main (fast-forward) and should be removed. The dev sandbox's git proxy blocks
# ref deletions, so CI (which has a write token) does it. Run manually from the
# Actions tab / dispatch. Idempotent — a no-op once the branch is gone.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      R: ${{ github.repository }}
    steps:
      - name: Delete v2-live-trading branch
        run: |
          set +e
          if gh api "repos/$R/git/refs/heads/v2-live-trading" >/dev/null 2>&1; then
            gh api -X DELETE "repos/$R/git/refs/heads/v2-live-trading" \
              && echo "Deleted branch v2-live-trading" \
              || { echo "Delete failed"; exit 1; }
          else
            echo "Branch v2-live-trading already gone."
          fi
          echo "Remaining branches:"
          gh api "repos/$R/branches" --jq '.[].name'
