name: Build & Release Desktop (Windows)

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows .exe
    # Pin to windows-2022: the newer "windows-latest" image ships a Visual
    # Studio that Flutter 3.24.5's toolchain detection can't see, so it falls
    # back to the "Visual Studio 16 2019" CMake generator and fails with
    # "could not find any instance of Visual Studio". windows-2022 has the
    # VS 2022 that this Flutter version detects reliably.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - run: flutter --version

      # Surface the detected Visual Studio toolchain (helps diagnose any future
      # runner-image regression before the build step).
      - name: Flutter doctor
        run: flutter doctor -v
        continue-on-error: true

      - name: Enable + generate Windows platform
        run: |
          flutter config --enable-windows-desktop
          flutter create . --platforms=windows --org com.willong --project-name nqe

      - name: Apply app icon
        shell: pwsh
        run: |
          Copy-Item assets/icon/app_icon.ico windows/runner/resources/app_icon.ico -Force

      - name: Get packages
        run: flutter pub get --enforce-lockfile

      # Read the version straight from pubspec — portable across Git Bash on
      # Windows (no gh CLI / pipefail pitfalls). The desktop build is a preview,
      # so the pubspec version is the right source of truth here.
      - name: Compute version
        id: ver
        shell: bash
        run: |
          ver=$(grep -E '^version:' pubspec.yaml \
            | sed -E 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          ver=${ver:-1.1.0}
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Version: $ver"

      - name: Build Windows (release)
        run: >
          flutter build windows --release
          --build-name=${{ steps.ver.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Package TRUE single-file .exe (virtualized) + zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rel = "build/windows/x64/runner/Release"
          if (!(Test-Path $rel)) { $rel = "build/windows/runner/Release" }
          $rel = (Resolve-Path $rel).Path
          $ver = "${{ steps.ver.outputs.version }}"

          # Sanity: the built bundle MUST contain the Flutter runtime + assets.
          foreach ($need in @("nqe.exe", "flutter_windows.dll", "data")) {
            if (!(Test-Path (Join-Path $rel $need))) { throw "Missing $need in $rel — build is incomplete" }
          }

          # Portable zip (fallback / power users).
          Compress-Archive -Path "$rel/*" -DestinationPath "NQE-desktop-v$ver.zip" -Force
          Copy-Item "NQE-desktop-v$ver.zip" "NQE-desktop-latest.zip" -Force

          # --- TRUE single-file exe via Enigma Virtual Box: every DLL and the
          # data/ folder are embedded INTO the exe and virtualized at runtime —
          # NO extraction to disk, NO admin rights. It runs like one file. ---
          Invoke-WebRequest -Uri "https://enigmaprotector.com/assets/files/enigmavb.exe" -OutFile "enigmavb_setup.exe"
          Start-Process -FilePath ".\enigmavb_setup.exe" -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -Wait
          $evb = "C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe"
          if (!(Test-Path $evb)) { $evb = "C:\Program Files\Enigma Virtual Box\enigmavbconsole.exe" }
          if (!(Test-Path $evb)) { throw "Enigma Virtual Box console not found after install" }

          $inputExe = Join-Path $rel "nqe.exe"
          $outputExe = Join-Path (Get-Location).Path "NQE-v$ver.exe"

          function XmlEsc([string]$s) {
            return $s.Replace('&','&amp;').Replace('<','&lt;').Replace('>','&gt;').Replace('"','&quot;')
          }
          # Recursively emit the virtual-file tree for everything except nqe.exe
          # (nqe.exe is the InputFile the box is built around).
          function New-Nodes([string]$dir) {
            $sb = New-Object System.Text.StringBuilder
            foreach ($it in Get-ChildItem -LiteralPath $dir | Sort-Object Name) {
              $nm = XmlEsc $it.Name
              if ($it.PSIsContainer) {
                [void]$sb.Append("<File><Type>3</Type><Name>$nm</Name><Files>")
                [void]$sb.Append((New-Nodes $it.FullName))
                [void]$sb.Append("</Files></File>")
              } elseif ($it.FullName -ne $inputExe) {
                $fp = XmlEsc $it.FullName
                [void]$sb.Append("<File><Type>2</Type><Name>$nm</Name><File>$fp</File><ActiveX>false</ActiveX><ActiveXInstall>false</ActiveXInstall><Action>0</Action><OverwriteDateTime>false</OverwriteDateTime><OverwriteAttributes>false</OverwriteAttributes><PassCommandLine>false</PassCommandLine></File>")
              }
            }
            return $sb.ToString()
          }
          $nodes = New-Nodes $rel

          # Build the .evb as an indented array-join (NOT a column-0 here-string,
          # which would break the YAML block AND put whitespace before <?xml>).
          $evbLines = @(
            '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>',
            '<>',
            "`t<InputFile>$(XmlEsc $inputExe)</InputFile>",
            "`t<OutputFile>$(XmlEsc $outputExe)</OutputFile>",
            "`t<Files>",
            "`t`t<Enabled>true</Enabled>",
            "`t`t<DeleteExtractedOnExit>false</DeleteExtractedOnExit>",
            "`t`t<CompressFiles>true</CompressFiles>",
            "`t`t<Files>",
            "`t`t`t<File>",
            "`t`t`t`t<Type>3</Type>",
            "`t`t`t`t<Name>%DEFAULT FOLDER%</Name>",
            "`t`t`t`t<Files>$nodes</Files>",
            "`t`t`t</File>",
            "`t`t</Files>",
            "`t</Files>",
            "`t<Options>",
            "`t`t<ShareVirtualSystem>false</ShareVirtualSystem>",
            "`t`t<MapExecutableWithTemporaryFile>true</MapExecutableWithTemporaryFile>",
            "`t`t<AllowRunningOfVirtualExeFiles>true</AllowRunningOfVirtualExeFiles>",
            "`t</Options>",
            '</>'
          )
          [System.IO.File]::WriteAllText("nqe.evb", ($evbLines -join "`r`n"), (New-Object System.Text.UTF8Encoding($false)))
          Write-Host "Running Enigma Virtual Box..."
          & $evb "nqe.evb"

          # HARD verification: a real virtualized exe embeds the whole bundle, so
          # it must be large (~13 MB). This stops any broken/empty exe shipping.
          if (!(Test-Path $outputExe)) { throw "Enigma did not produce the exe" }
          $size = (Get-Item $outputExe).Length
          Write-Host ("Single exe size: {0:N1} MB" -f ($size / 1MB))
          if ($size -lt 8MB) { throw "Single exe is only $size bytes — files were not embedded" }
          Copy-Item $outputExe "NQE-desktop-latest.exe" -Force

          # Keep only the NQE artifacts.
          Remove-Item enigmavb_setup.exe, nqe.evb -Force -ErrorAction SilentlyContinue
          Write-Host "Artifacts:"
          Get-ChildItem NQE-*.exe, NQE-*.zip | Select-Object Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NQE-desktop
          path: |
            NQE-*.exe
            NQE-*.zip

      # Publish the .exe into the SAME single `latest` release as the APK.
      - name: Publish single release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: NQE v${{ steps.ver.outputs.version }}
          body: |
            NQE v${{ steps.ver.outputs.version }} — Funds managed by Willong Capital.

            • Android — install `NQE-v${{ steps.ver.outputs.version }}.apk`
            • Windows — run `NQE-v${{ steps.ver.outputs.version }}.exe` (one file, no install, no admin)
          files: |
            NQE-*.exe
            NQE-*.zip
          prerelease: false

      # Remove junk assets (build tools) that older runs uploaded into `latest`.
      - name: Prune stray release assets
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag: 'latest' });
            const strays = ['rcedit.exe', 'rcedit-x64.exe', 'warp-packer.exe', 'windows-x64.warp-packer.exe'];
            for (const a of rel.data.assets) {
              if (strays.includes(a.name)) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: a.id });
                core.info('Deleted stray asset ' + a.name);
              }
            }

