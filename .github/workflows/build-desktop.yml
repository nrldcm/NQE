name: Build & Release Desktop (Windows)

on:
  push:
    branches: [main, v2-live-trading]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - run: flutter --version

      - name: Enable + generate Windows platform
        run: |
          flutter config --enable-windows-desktop
          flutter create . --platforms=windows --org com.willong --project-name nqe

      - name: Apply app icon
        shell: pwsh
        run: |
          Copy-Item assets/icon/app_icon.ico windows/runner/resources/app_icon.ico -Force

      - name: Get packages
        run: flutter pub get --enforce-lockfile

      - name: Compute version
        id: ver
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName -q '.[].tagName' 2>/dev/null \
            | grep -E '^v1\.[0-9]+\.0$' | sed -E 's/^v1\.([0-9]+)\.0$/\1/' \
            | sort -n | tail -1)
          next=$(( ${latest:-0} + 1 ))
          echo "version=1.$next.0" >> "$GITHUB_OUTPUT"
          echo "Version: 1.$next.0"

      - name: Build Windows (release)
        run: >
          flutter build windows --release
          --build-name=${{ steps.ver.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Package single-file .exe + zip
        shell: pwsh
        run: |
          $rel = "build/windows/x64/runner/Release"
          if (!(Test-Path $rel)) { $rel = "build/windows/runner/Release" }
          $ver = "${{ steps.ver.outputs.version }}"
          # Portable zip (fallback / power users).
          Compress-Archive -Path "$rel/*" -DestinationPath "NQE-desktop-v$ver.zip" -Force
          Copy-Item "NQE-desktop-v$ver.zip" "NQE-desktop-latest.zip" -Force
          # Single self-contained .exe via warp-packer (runs the whole app from one file).
          Invoke-WebRequest -Uri "https://github.com/dgiagio/warp/releases/download/v0.3.0/windows-x64.warp-packer.exe" -OutFile warp-packer.exe
          ./warp-packer.exe --arch windows-x64 --input_dir "$rel" --exec nqe.exe --output "NQE-v$ver.exe"
          Copy-Item "NQE-v$ver.exe" "NQE-desktop-latest.exe" -Force
          Get-ChildItem *.exe, *.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NQE-desktop
          path: |
            *.exe
            *.zip

      - name: Publish rolling + versioned (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: NQE — latest build
          files: "*.zip"
          prerelease: true

      - name: Publish v2 preview (desktop)
        if: github.ref == 'refs/heads/v2-live-trading'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2-preview
          name: NQE v2 — preview (unstable)
          files: "*.zip"
          prerelease: true
