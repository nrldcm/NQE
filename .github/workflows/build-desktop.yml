name: Build & Release Desktop (Windows)

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows .exe
    # Pin to windows-2022: the newer "windows-latest" image ships a Visual
    # Studio that Flutter 3.24.5's toolchain detection can't see, so it falls
    # back to the "Visual Studio 16 2019" CMake generator and fails with
    # "could not find any instance of Visual Studio". windows-2022 has the
    # VS 2022 that this Flutter version detects reliably.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - run: flutter --version

      # Surface the detected Visual Studio toolchain (helps diagnose any future
      # runner-image regression before the build step).
      - name: Flutter doctor
        run: flutter doctor -v
        continue-on-error: true

      - name: Enable + generate Windows platform
        run: |
          flutter config --enable-windows-desktop
          flutter create . --platforms=windows --org com.willong --project-name nqe

      - name: Apply app icon
        shell: pwsh
        run: |
          Copy-Item assets/icon/app_icon.ico windows/runner/resources/app_icon.ico -Force

      - name: Get packages
        run: flutter pub get --enforce-lockfile

      # Read the version straight from pubspec — portable across Git Bash on
      # Windows (no gh CLI / pipefail pitfalls). The desktop build is a preview,
      # so the pubspec version is the right source of truth here.
      - name: Compute version
        id: ver
        shell: bash
        run: |
          ver=$(grep -E '^version:' pubspec.yaml \
            | sed -E 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          ver=${ver:-1.1.0}
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Version: $ver"

      - name: Build Windows (release)
        run: >
          flutter build windows --release
          --build-name=${{ steps.ver.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Package single-file .exe + zip
        shell: pwsh
        run: |
          $rel = "build/windows/x64/runner/Release"
          if (!(Test-Path $rel)) { $rel = "build/windows/runner/Release" }
          $ver = "${{ steps.ver.outputs.version }}"
          # Portable zip (fallback / power users).
          Compress-Archive -Path "$rel/*" -DestinationPath "NQE-desktop-v$ver.zip" -Force
          Copy-Item "NQE-desktop-v$ver.zip" "NQE-desktop-latest.zip" -Force
          # Single self-contained .exe via warp-packer (runs the whole app from one file).
          Invoke-WebRequest -Uri "https://github.com/dgiagio/warp/releases/download/v0.3.0/windows-x64.warp-packer.exe" -OutFile warp-packer.exe
          ./warp-packer.exe --arch windows-x64 --input_dir "$rel" --exec nqe.exe --output "NQE-v$ver.exe"
          # The warp wrapper exe has a generic icon — stamp the NQE leaf icon on
          # it (and the inner nqe.exe already has it) with rcedit.
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile rcedit.exe
          ./rcedit.exe "NQE-v$ver.exe" --set-icon "assets/icon/app_icon.ico"
          Copy-Item "NQE-v$ver.exe" "NQE-desktop-latest.exe" -Force
          Get-ChildItem *.exe, *.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NQE-desktop
          path: |
            *.exe
            *.zip

      # Publish the .exe into the SAME single `latest` release as the APK.
      - name: Publish single release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: NQE v${{ steps.ver.outputs.version }}
          body: |
            NQE v${{ steps.ver.outputs.version }} — Funds managed by Willong Capital.

            • Android — install `NQE-v${{ steps.ver.outputs.version }}.apk`
            • Windows — run `NQE-v${{ steps.ver.outputs.version }}.exe` (single file)
          files: |
            *.exe
            *.zip
          prerelease: false

