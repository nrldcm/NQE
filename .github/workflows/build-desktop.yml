name: Build & Release Desktop (Windows)

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows .exe
    # Pin to windows-2022: the newer "windows-latest" image ships a Visual
    # Studio that Flutter 3.24.5's toolchain detection can't see, so it falls
    # back to the "Visual Studio 16 2019" CMake generator and fails with
    # "could not find any instance of Visual Studio". windows-2022 has the
    # VS 2022 that this Flutter version detects reliably.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - run: flutter --version

      # Surface the detected Visual Studio toolchain (helps diagnose any future
      # runner-image regression before the build step).
      - name: Flutter doctor
        run: flutter doctor -v
        continue-on-error: true

      - name: Enable + generate Windows platform
        run: |
          flutter config --enable-windows-desktop
          flutter create . --platforms=windows --org com.willong --project-name nqe

      - name: Apply app icon
        shell: pwsh
        run: |
          Copy-Item assets/icon/app_icon.ico windows/runner/resources/app_icon.ico -Force

      - name: Get packages
        run: flutter pub get --enforce-lockfile

      # Read the version straight from pubspec — portable across Git Bash on
      # Windows (no gh CLI / pipefail pitfalls). The desktop build is a preview,
      # so the pubspec version is the right source of truth here.
      - name: Compute version
        id: ver
        shell: bash
        run: |
          ver=$(grep -E '^version:' pubspec.yaml \
            | sed -E 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          ver=${ver:-1.1.0}
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Version: $ver"

      - name: Build Windows (release)
        run: >
          flutter build windows --release
          --build-name=${{ steps.ver.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Package single-file .exe + zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rel = "build/windows/x64/runner/Release"
          if (!(Test-Path $rel)) { $rel = "build/windows/runner/Release" }
          $ver = "${{ steps.ver.outputs.version }}"
          $seven = "C:\Program Files\7-Zip\7z.exe"
          $sfxModule = "C:\Program Files\7-Zip\7z.sfx"

          # Sanity: the built bundle MUST contain the Flutter runtime and assets,
          # or a single exe would be a broken launcher. Fail loudly if missing.
          foreach ($need in @("nqe.exe", "flutter_windows.dll", "data")) {
            if (!(Test-Path (Join-Path $rel $need))) { throw "Missing $need in $rel — build is incomplete" }
          }

          # Portable zip (fallback / power users).
          Compress-Archive -Path "$rel/*" -DestinationPath "NQE-desktop-v$ver.zip" -Force
          Copy-Item "NQE-desktop-v$ver.zip" "NQE-desktop-latest.zip" -Force

          # --- Real single-file exe: a 7-Zip self-extracting archive holding the
          # WHOLE bundle (every DLL + the data/ folder). On launch it silently
          # unpacks to a temp dir and runs nqe.exe, so it actually works on a
          # clean PC — unlike a bare launcher stub. ---
          & $seven a -t7z -mx=9 "app.7z" "$rel/*" | Out-Null

          # Stamp the NQE icon onto the SFX stub BEFORE appending the archive, so
          # editing PE resources can never disturb the 7z payload.
          Copy-Item $sfxModule "nqe_sfx.exe" -Force
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile rcedit.exe
          ./rcedit.exe "nqe_sfx.exe" --set-icon "assets/icon/app_icon.ico" `
            --set-version-string "ProductName" "NQE" `
            --set-version-string "FileDescription" "NQE - Funds managed by Willong Capital"

          # SFX config: quiet extract to temp, then run the app.
          $cfg = ";!@Install@!UTF-8!`r`nTitle=`"NQE`"`r`nProgress=`"no`"`r`nRunProgram=`"nqe.exe`"`r`n;!@InstallEnd@!`r`n"
          [System.IO.File]::WriteAllText("config.txt", $cfg, (New-Object System.Text.UTF8Encoding($false)))

          # stub + config + archive → one self-running exe.
          cmd /c copy /b nqe_sfx.exe + config.txt + app.7z "NQE-v$ver.exe" > $null
          Copy-Item "NQE-v$ver.exe" "NQE-desktop-latest.exe" -Force

          # HARD verification: the single exe must be substantial and must list
          # nqe.exe inside it. This is what stops another 1 MB dud from shipping.
          $size = (Get-Item "NQE-v$ver.exe").Length
          Write-Host ("Single exe size: {0:N1} MB" -f ($size / 1MB))
          if ($size -lt 5MB) { throw "Single exe is only $size bytes — bundle was not embedded" }
          $listing = & $seven l "NQE-v$ver.exe"
          if (($listing | Select-String -Quiet "nqe.exe") -ne $true) {
            throw "nqe.exe not found inside NQE-v$ver.exe — SFX is broken"
          }
          if (($listing | Select-String -Quiet "flutter_windows.dll") -ne $true) {
            throw "flutter_windows.dll not found inside the single exe"
          }

          # Remove tooling/intermediates so ONLY the NQE artifacts ship.
          Remove-Item rcedit.exe, nqe_sfx.exe, app.7z, config.txt -Force -ErrorAction SilentlyContinue
          Write-Host "Artifacts:"
          Get-ChildItem NQE-*.exe, NQE-*.zip | Select-Object Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NQE-desktop
          path: |
            NQE-*.exe
            NQE-*.zip

      # Publish the .exe into the SAME single `latest` release as the APK.
      - name: Publish single release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: NQE v${{ steps.ver.outputs.version }}
          body: |
            NQE v${{ steps.ver.outputs.version }} — Funds managed by Willong Capital.

            • Android — install `NQE-v${{ steps.ver.outputs.version }}.apk`
            • Windows — run `NQE-v${{ steps.ver.outputs.version }}.exe` (single file)
          files: |
            NQE-*.exe
            NQE-*.zip
          prerelease: false

      # Remove junk assets (build tools) that older runs uploaded into `latest`.
      - name: Prune stray release assets
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag: 'latest' });
            const strays = ['rcedit.exe', 'rcedit-x64.exe', 'warp-packer.exe', 'windows-x64.warp-packer.exe'];
            for (const a of rel.data.assets) {
              if (strays.includes(a.name)) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: a.id });
                core.info('Deleted stray asset ' + a.name);
              }
            }

