name: Build & Release Desktop (Windows)

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows .exe
    # Pin to windows-2022: the newer "windows-latest" image ships a Visual
    # Studio that Flutter 3.24.5's toolchain detection can't see, so it falls
    # back to the "Visual Studio 16 2019" CMake generator and fails with
    # "could not find any instance of Visual Studio". windows-2022 has the
    # VS 2022 that this Flutter version detects reliably.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - run: flutter --version

      # Surface the detected Visual Studio toolchain (helps diagnose any future
      # runner-image regression before the build step).
      - name: Flutter doctor
        run: flutter doctor -v
        continue-on-error: true

      - name: Enable + generate Windows platform
        run: |
          flutter config --enable-windows-desktop
          flutter create . --platforms=windows --org com.willong --project-name nqe

      - name: Apply app icon
        shell: pwsh
        run: |
          Copy-Item assets/icon/app_icon.ico windows/runner/resources/app_icon.ico -Force

      - name: Get packages
        run: flutter pub get --enforce-lockfile

      # Read the version straight from pubspec — portable across Git Bash on
      # Windows (no gh CLI / pipefail pitfalls). The desktop build is a preview,
      # so the pubspec version is the right source of truth here.
      - name: Compute version
        id: ver
        shell: bash
        run: |
          ver=$(grep -E '^version:' pubspec.yaml \
            | sed -E 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          ver=${ver:-1.1.0}
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Version: $ver"

      - name: Build Windows (release)
        run: >
          flutter build windows --release
          --build-name=${{ steps.ver.outputs.version }}
          --build-number=${{ github.run_number }}

      - name: Package installer (.exe, no admin) + zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rel = "build/windows/x64/runner/Release"
          if (!(Test-Path $rel)) { $rel = "build/windows/runner/Release" }
          $rel = (Resolve-Path $rel).Path
          $ver = "${{ steps.ver.outputs.version }}"
          $cwd = (Get-Location).Path
          $icon = (Resolve-Path "assets/icon/app_icon.ico").Path

          # Sanity: the built bundle MUST contain the Flutter runtime + assets.
          foreach ($need in @("nqe.exe", "flutter_windows.dll", "data")) {
            if (!(Test-Path (Join-Path $rel $need))) { throw "Missing $need in $rel — build is incomplete" }
          }

          # Portable zip (fallback / power users): extract anywhere, run nqe.exe.
          Compress-Archive -Path "$rel/*" -DestinationPath "NQE-desktop-v$ver.zip" -Force
          Copy-Item "NQE-desktop-v$ver.zip" "NQE-desktop-latest.zip" -Force

          # --- Single-file Windows installer via Inno Setup. ONE .exe you run;
          # a per-user install (PrivilegesRequired=lowest → NO admin), which
          # antivirus trusts (unlike a packed/virtualized exe, which Defender
          # false-flags). It installs to %LocalAppData%, makes shortcuts and
          # launches the app. ---
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          if (!(Test-Path $iscc)) { throw "Inno Setup (ISCC.exe) not found on the runner" }

          # Build the .iss as an indented array-join (keeps the YAML block valid).
          $issLines = @(
            '[Setup]',
            'AppId={{6B9C1E90-NQE0-4A11-Willong-Capital0001}',
            'AppName=NQE',
            "AppVersion=$ver",
            'AppPublisher=Willong Capital',
            'DefaultDirName={localappdata}\Programs\NQE',
            'DisableProgramGroupPage=yes',
            'DisableDirPage=yes',
            'PrivilegesRequired=lowest',
            "OutputDir=$cwd",
            "OutputBaseFilename=NQE-v$ver",
            "SetupIconFile=$icon",
            'UninstallDisplayIcon={app}\nqe.exe',
            'Compression=lzma2',
            'SolidCompression=yes',
            'WizardStyle=modern',
            '',
            '[Files]',
            "Source: `"$rel\*`"; DestDir: `"{app}`"; Flags: recursesubdirs createallsubdirs ignoreversion",
            '',
            '[Icons]',
            'Name: "{autoprograms}\NQE"; Filename: "{app}\nqe.exe"',
            'Name: "{autodesktop}\NQE"; Filename: "{app}\nqe.exe"',
            '',
            '[Run]',
            'Filename: "{app}\nqe.exe"; Description: "Launch NQE"; Flags: nowait postinstall skipifsilent'
          )
          [System.IO.File]::WriteAllText("nqe.iss", ($issLines -join "`r`n"), (New-Object System.Text.UTF8Encoding($false)))
          & $iscc "nqe.iss"

          $outExe = Join-Path $cwd "NQE-v$ver.exe"
          if (!(Test-Path $outExe)) { throw "Inno Setup did not produce the installer" }
          $size = (Get-Item $outExe).Length
          Write-Host ("Installer size: {0:N1} MB" -f ($size / 1MB))
          if ($size -lt 6MB) { throw "Installer is only $size bytes — the app wasn't bundled" }
          Copy-Item $outExe "NQE-desktop-latest.exe" -Force

          Remove-Item nqe.iss -Force -ErrorAction SilentlyContinue
          Write-Host "Artifacts:"
          Get-ChildItem NQE-*.exe, NQE-*.zip | Select-Object Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NQE-desktop
          path: |
            NQE-*.exe
            NQE-*.zip

      # Publish the .exe into the SAME single `latest` release as the APK.
      - name: Publish single release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: NQE v${{ steps.ver.outputs.version }}
          body: |
            NQE v${{ steps.ver.outputs.version }} — Funds managed by Willong Capital.

            • Android — install `NQE-v${{ steps.ver.outputs.version }}.apk`
            • Windows — run `NQE-v${{ steps.ver.outputs.version }}.exe` (installer, no admin). Or use the `.zip` (extract → run `nqe.exe`).
          files: |
            NQE-*.exe
            NQE-*.zip
          prerelease: false

      # Remove junk assets (build tools) that older runs uploaded into `latest`.
      - name: Prune stray release assets
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag: 'latest' });
            const strays = ['rcedit.exe', 'rcedit-x64.exe', 'warp-packer.exe', 'windows-x64.warp-packer.exe'];
            for (const a of rel.data.assets) {
              if (strays.includes(a.name)) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: a.id });
                core.info('Deleted stray asset ' + a.name);
              }
            }

