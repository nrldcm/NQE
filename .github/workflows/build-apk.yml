name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/**"
  workflow_dispatch:

# Least privilege by default; only the build job needs to publish releases.
permissions:
  contents: read

jobs:
  test:
    name: Regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get --enforce-lockfile
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true
      - name: Unit tests
        run: flutter test

  build:
    name: Build release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - run: flutter --version

      # Use a STABLE signing key across builds so app updates install over the
      # previous version instead of forcing an uninstall (which would wipe the
      # on-device ledger). Reuses the committed keystore as the debug key.
      - name: Install stable signing key
        run: |
          mkdir -p ~/.android
          base64 -d android-signing/nqe-debug-keystore.b64 > ~/.android/debug.keystore
          keytool -list -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey | grep -E "SHA1|Valid" || true

      - name: Prepare & harden Android project
        run: bash tool/prepare_android.sh

      - name: Get packages
        run: flutter pub get --enforce-lockfile

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      # Build the Flutter web app and stage it into assets/web/ so the phone's
      # sync server can serve it (opening the phone's LAN URL in a browser loads
      # NQE). Must run BEFORE `flutter build apk` so the APK bundles the assets.
      - name: Build & stage web app
        run: |
          flutter config --enable-web
          flutter create . --platforms=web --org com.willong --project-name nqe
          dart run sqflite_common_ffi_web:setup
          # Brand the web app: title "NQE Web" + the NQE icon as the favicon /
          # PWA icons (flutter create ships generic Flutter defaults).
          sed -i 's#<title>[^<]*</title>#<title>NQE Web</title>#' web/index.html || true
          sed -i 's#content="[^"]*"\s*/>\(\s*<!-- iOS meta\)#content="NQE Web"/>\1#' web/index.html || true
          sed -i 's#"name": *"[^"]*"#"name": "NQE Web"#; s#"short_name": *"[^"]*"#"short_name": "NQE Web"#' web/manifest.json || true
          if [ -f assets/icon/nqe_icon.png ]; then
            cp assets/icon/nqe_icon.png web/favicon.png || true
            mkdir -p web/icons
            cp assets/icon/nqe_icon.png web/icons/Icon-192.png || true
            cp assets/icon/nqe_icon.png web/icons/Icon-512.png || true
            cp assets/icon/nqe_icon.png web/icons/Icon-maskable-192.png || true
            cp assets/icon/nqe_icon.png web/icons/Icon-maskable-512.png || true
          fi
          flutter build web --release --no-tree-shake-icons
          rm -rf assets/web
          mkdir -p assets/web
          cp -r build/web/. assets/web/
          ls -la assets/web

      # Version comes from pubspec (single source of truth) so the APK carries a
      # stable version, and pushes don't spawn a new versioned release each
      # time. Build number is monotonic.
      - name: Compute version
        id: ver
        run: |
          ver=$(grep -E '^version:' pubspec.yaml \
            | sed -E 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          ver=${ver:-1.1.0}
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Version: $ver (build ${GITHUB_RUN_NUMBER})"

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --build-name=${{ steps.ver.outputs.version }} \
            --build-number=${{ steps.ver.outputs.code }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/NQE-v${{ steps.ver.outputs.version }}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk dist/NQE-latest.apk
          ls -la dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NQE-apk
          path: dist/*.apk

      # ONE release for everything, published to the `latest` tag. The Windows
      # desktop (.exe) build has been deprecated — the app now ships as the
      # Android APK plus the phone-served web app, so no separate installer.
      - name: Publish single release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: NQE v${{ steps.ver.outputs.version }}
          body: |
            NQE v${{ steps.ver.outputs.version }} — Funds managed by Willong Capital.

            • Android — install `NQE-v${{ steps.ver.outputs.version }}.apk`

            (On Android you may need to allow "install from unknown sources".)
          files: dist/*.apk
          prerelease: false
