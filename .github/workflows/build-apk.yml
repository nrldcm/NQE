name: Build & Release APK

on:
  push:
    branches: [main, v2-live-trading]
    tags: ["v*"]
  workflow_dispatch:

# Least privilege by default; only the build job needs to publish releases.
permissions:
  contents: read

jobs:
  test:
    name: Regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get --enforce-lockfile
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true
      - name: Unit tests
        run: flutter test

  build:
    name: Build release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - run: flutter --version

      # Use a STABLE signing key across builds so app updates install over the
      # previous version instead of forcing an uninstall (which would wipe the
      # on-device ledger). Reuses the committed keystore as the debug key.
      - name: Install stable signing key
        run: |
          mkdir -p ~/.android
          base64 -d android-signing/nqe-debug-keystore.b64 > ~/.android/debug.keystore
          keytool -list -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey | grep -E "SHA1|Valid" || true

      - name: Prepare & harden Android project
        run: bash tool/prepare_android.sh

      - name: Get packages
        run: flutter pub get --enforce-lockfile

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      # Intelligent versioning: major stays 1, minor auto-increments from the
      # highest existing v1.N.0 release; build number is monotonic (run number).
      - name: Compute version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 200 \
            --json tagName -q '.[].tagName' 2>/dev/null \
            | grep -E '^v1\.[0-9]+\.0$' | sed -E 's/^v1\.([0-9]+)\.0$/\1/' \
            | sort -n | tail -1)
          next=$(( ${latest:-0} + 1 ))
          echo "version=1.$next.0" >> "$GITHUB_OUTPUT"
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Next version: 1.$next.0 (build ${GITHUB_RUN_NUMBER})"

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --build-name=${{ steps.ver.outputs.version }} \
            --build-number=${{ steps.ver.outputs.code }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/NQE-v${{ steps.ver.outputs.version }}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk dist/NQE-latest.apk
          ls -la dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NQE-apk
          path: dist/*.apk

      # Rolling "latest" release on every push to main.
      - name: Publish rolling release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: NQE — latest build
          body: |
            Automatic build of NQE from the latest commit on `main`.
            Install `NQE-latest.apk` on your Android device.
            (You may need to allow "install from unknown sources".)
          files: dist/*.apk
          prerelease: true

      # Preview release on the feature branch so the APK can be side-loaded &
      # tested before it is merged to main. This is STILL version 1 — the
      # "preview" channel just carries the newest 1.x feature build.
      - name: Publish preview (apk)
        if: github.ref == 'refs/heads/v2-live-trading'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview
          name: NQE — preview (v1, unstable)
          body: |
            Preview build of NQE v${{ steps.ver.outputs.version }} — Funds
            managed by Willong Capital. Still version 1; includes the Live tab,
            Developer Mode, and secure device pairing / LAN sync. For testing
            only — not a stable release.
          files: dist/*.apk
          prerelease: true

      # Distinct VERSIONED release (tag = pubspec version) on every main push.
      # CI's token can create the tag/release even though local tag pushes are
      # blocked by the environment proxy.
      - name: Publish versioned release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: NQE v${{ steps.ver.outputs.version }}
          body: |
            NQE v${{ steps.ver.outputs.version }} — Funds managed by Willong Capital.
            Install `NQE-v${{ steps.ver.outputs.version }}.apk`.
          files: dist/*.apk

      # Versioned release when a v* tag is pushed.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: NQE ${{ github.ref_name }}
          body: |
            NQE release ${{ github.ref_name }}.
            Funds managed by Willong Capital.
          files: dist/*.apk
