name: Build & Release APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true
      - name: Unit tests
        run: flutter test

  build:
    name: Build release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable
          cache: true

      - run: flutter --version

      - name: Prepare Android project
        run: bash tool/prepare_android.sh

      - name: Get packages
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/NQE-${GITHUB_SHA::7}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk dist/NQE-latest.apk
          ls -la dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NQE-apk
          path: dist/*.apk

      # Rolling "latest" release on every push to main.
      - name: Publish rolling release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: NQE — latest build
          body: |
            Automatic build of NQE from the latest commit on `main`.
            Install `NQE-latest.apk` on your Android device.
            (You may need to allow "install from unknown sources".)
          files: dist/*.apk
          prerelease: true

      # Versioned release when a v* tag is pushed.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: NQE ${{ github.ref_name }}
          body: |
            NQE release ${{ github.ref_name }}.
            Funds managed by Willong Capital.
          files: dist/*.apk
