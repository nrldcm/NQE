name: Cleanup legacy v2 tag/release

# Maintenance: the old preview channel was named "v2-preview", which wrongly
# implied a version 2. Everything is version 1. This removes the stale
# v2-preview release (if any) and its git tag. Runs on push to the feature
# branch (so it self-heals) and can also be run manually. Safe to re-run —
# every step is idempotent and a no-op once the tag is gone.
on:
  workflow_dispatch:
  push:
    branches: [v2-live-trading]
    paths: [".github/workflows/cleanup-legacy-tag.yml"]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      R: ${{ github.repository }}
    steps:
      - name: Delete v2-preview release (if present)
        run: |
          id=$(gh api "repos/$R/releases/tags/v2-preview" --jq '.id' 2>/dev/null || true)
          if [ -n "${id:-}" ]; then
            gh api -X DELETE "repos/$R/releases/$id" && echo "Deleted release $id"
          else
            echo "No v2-preview release."
          fi

      - name: Delete v2-preview tag (if present)
        run: |
          if gh api "repos/$R/git/refs/tags/v2-preview" >/dev/null 2>&1; then
            gh api -X DELETE "repos/$R/git/refs/tags/v2-preview" && echo "Deleted tag v2-preview"
          else
            echo "No v2-preview tag."
          fi

      - name: Show remaining tags
        run: gh api "repos/$R/tags" --jq '.[].name' || true
